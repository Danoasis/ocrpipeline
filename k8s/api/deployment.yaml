apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocrpipeline-api
  namespace: ocrpipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocrpipeline-api
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 0, maxSurge: 1 }
  template:
    metadata:
      labels:
        app: ocrpipeline-api
    spec:
      containers:
        - name: api
          image: 414154103562.dkr.ecr.us-east-1.amazonaws.com/ocrpipeline:latest
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ocrpipeline-config
          resources:
            requests: { memory: "512Mi", cpu: "250m" }
            limits:   { memory: "1Gi",   cpu: "1000m" }
          livenessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /api/health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: pipeline-data
              mountPath: /data
      volumes:
        - name: pipeline-data
          persistentVolumeClaim:
            claimName: pipeline-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pipeline-data-pvc
  namespace: ocrpipeline
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 15Gi
  storageClassName: gp2

name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Do NOT put secrets here — they resolve as empty at workflow level.
  # Non-secret constants are fine here.
  ECR_REPOSITORY: ocrpipeline
  K8S_NAMESPACE:  ocrpipeline
  K8S_DEPLOYMENT: ocrpipeline-api

jobs:

  build-and-push:
    name: Build & push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_uri: ${{ steps.meta.outputs.uri }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Build ECR_REGISTRY inside the step where secrets are available.
      # Also compute the image tag from the git commit SHA here.
      # We write both to GITHUB_OUTPUT so subsequent steps and jobs can use them.
      - name: Compute image tag and registry URL
        id: meta
        run: |
          ECR_REGISTRY="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${SHORT_SHA}"
          CACHE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:cache"
          LATEST_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

          echo "registry=${ECR_REGISTRY}" >> $GITHUB_OUTPUT
          echo "tag=${SHORT_SHA}"         >> $GITHUB_OUTPUT
          echo "uri=${IMAGE_URI}"         >> $GITHUB_OUTPUT
          echo "cache=${CACHE_URI}"       >> $GITHUB_OUTPUT
          echo "latest=${LATEST_URI}"     >> $GITHUB_OUTPUT

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.uri }}
            ${{ steps.meta.outputs.latest }}
          build-args: |
            BASE_IMAGE=python:3.11-slim
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache }}
          cache-to:   type=registry,ref=${{ steps.meta.outputs.cache }},mode=max

      - name: Deployment summary
        run: |
          echo "✅ Pushed ${{ steps.meta.outputs.uri }}" >> $GITHUB_STEP_SUMMARY
          echo "Actor: ${{ github.actor }}"              >> $GITHUB_STEP_SUMMARY


  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name   ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Deploy new image
        run: |
          kubectl set image deployment/${{ env.K8S_DEPLOYMENT }} \
            api=${{ needs.build-and-push.outputs.image_uri }} \
            --namespace ${{ env.K8S_NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.K8S_DEPLOYMENT }} \
            --namespace ${{ env.K8S_NAMESPACE }} \
            --timeout=5m

      - name: Annotate deployment
        run: |
          kubectl annotate deployment/${{ env.K8S_DEPLOYMENT }} \
            --namespace ${{ env.K8S_NAMESPACE }} --overwrite \
            deployment.kubernetes.io/sha="${{ github.sha }}" \
            deployment.kubernetes.io/actor="${{ github.actor }}"


  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()
    steps:
      - name: Write failure summary
        run: |
          echo "## ❌ Deployment failed"     >> $GITHUB_STEP_SUMMARY
          echo "Commit: ${{ github.sha }}"   >> $GITHUB_STEP_SUMMARY
          echo "Actor:  ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
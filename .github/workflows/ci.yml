name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run pytest
        run: pytest -v --tb=short

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      # Pass BASE_IMAGE=python:3.11-slim so the build uses the CPU base.
      # The Dockerfile default (nvidia/cuda) only applies when no arg is passed —
      # i.e. when you run docker compose locally on your GPU machine.
      # No sed, no file patching — the Dockerfile handles both cases natively.
      - name: Build Docker image (CPU variant for CI)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ocrpipeline:ci
          build-args: |
            BASE_IMAGE=python:3.11-slim

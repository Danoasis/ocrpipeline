[defaults]
inventory         = inventory.ini
remote_user       = ubuntu
private_key_file  = ~/.ssh/id_rsa
roles_path        = roles
forks             = 10
nocows            = true
retry_files_enabled = false

[ssh_connection]
pipelining = true
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[privilege_escalation]
become_method   = sudo
become_ask_pass = false
